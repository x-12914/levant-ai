# Levant AI reverse-proxy vhost (nginx), behind the DuckDNS name levant-ai.duckdns.org.
# HTTP-only on purpose: run `sudo certbot --nginx -d levant-ai.duckdns.org`
# and certbot rewrites this file to add the TLS (443) server block + redirect.
# Drop into your EXISTING nginx alongside the other apps; nothing here touches them.

server {
    listen 80;
    server_name levant-ai.duckdns.org;

    # Built SPA assets: apps/web `npm run build` output copied to /opt/levant/web.
    root /opt/levant/web;
    index index.html;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST -> Node gateway (loopback only).
    location /api/ {
        proxy_pass http://127.0.0.1:8791;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket -> Node gateway.
    location /ws/ {
        proxy_pass http://127.0.0.1:8791;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
